name: build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: NuGet restore
        run: nuget restore VBASSH.sln -NonInteractive -Verbosity quiet

      - name: Build Release (no COM registration)
        run: msbuild VBASSH.sln /t:Build /p:Configuration=Release /p:Platform="Any CPU" /p:RegisterForComInterop=false /m /v:minimal

      - name: Test (MSTest)
        run: dotnet test VBASSH.Tests\VBASSH.Tests.vbproj -c Release --no-build --verbosity minimal
